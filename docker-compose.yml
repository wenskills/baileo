services:

  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       baileo
      POSTGRES_USER:     baileo
      POSTGRES_PASSWORD: baileo
    # Port 5432 non exposé → évite conflit avec PostgreSQL local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baileo -d baileo"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
      # Volume nommé pour vendor/ : préserve ce que le build Docker a créé
      # Sans ça, le bind mount ./backend:/ écrase vendor/ avec le dossier local (vide)
      - vendor_data:/var/www/html/vendor
      - ./backend/public/uploads:/var/www/html/public/uploads
    depends_on:
      database:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - vendor_data:/var/www/html/vendor
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./backend/public/uploads:/var/www/html/public/uploads
    depends_on:
      - backend

volumes:
  postgres_data:
  vendor_data:    # Contient le vendor/ installé pendant le docker build

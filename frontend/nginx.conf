server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy toutes les requêtes /api vers le backend nginx (conteneur "nginx")
    # Cela corrige le 405 : le build prod utilise /api (relatif) qui atterrissait
    # sur le nginx frontend au lieu du backend.
    location /api/ {
        proxy_pass http://nginx/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # SPA routing : tout le reste → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
